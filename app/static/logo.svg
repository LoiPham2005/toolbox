<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ToolBox">
  <defs>
    <linearGradient id="tbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tbLid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9e6ff"/>
    </linearGradient>
  </defs>

  <!-- nền bo góc -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#tbBg)"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#000" opacity="0.06"/>

  <!-- quai cầm -->
  <path d="M25 26 v-3 a2.5 2.5 0 0 1 2.5-2.5 h9 A2.5 2.5 0 0 1 39 23 v3"
        stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- thân hộp -->
  <rect x="14" y="30" width="36" height="20" rx="3.5" fill="#ffffff"/>
  <!-- nắp trên -->
  <rect x="12" y="25.5" width="40" height="8" rx="3" fill="url(#tbLid)"/>
  <!-- khóa/chốt giữa -->
  <rect x="28.5" y="28.5" width="7" height="6" rx="1.5" fill="#6366f1"/>
  <!-- đường gân thân hộp -->
  <rect x="14" y="41" width="36" height="2" fill="#6366f1" opacity="0.18"/>
</svg>
